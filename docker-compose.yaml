# ==============================================================
# CraveDrop Local Development & Testing Environment
# ==============================================================

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: cravedrop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cravedrop_user
      POSTGRES_PASSWORD: cravedrop_pass_2026
      POSTGRES_DB: cravedrop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cravedrop_user -d cravedrop_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security: read-only root filesystem where possible
    tmpfs:
      - /tmp
      - /run

  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cravedrop-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:3000"
      JWT_SECRET: "cravedrop-2026-secret"
      DB_USER: cravedrop_user
      DB_PASSWORD: cravedrop_pass_2026
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: cravedrop_db
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    # Security: do not run as root (enforced at the orchestration level)
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---- Frontend (Nginx + React) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cravedrop-frontend
    restart: unless-stopped
    ports:
      # Maps local port 8080 to Nginx container port 80
      - "8080:80"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local