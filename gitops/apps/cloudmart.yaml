apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudmart
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/cloudmart-gitops.git
    targetRevision: main
    path: charts/cloudmart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudmart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
