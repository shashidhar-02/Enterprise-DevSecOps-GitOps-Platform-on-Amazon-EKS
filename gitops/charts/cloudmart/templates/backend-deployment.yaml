apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: '8080'
            - name: MONGO_URI
              value: mongodb://{{ .Release.Name }}-mongo:27017/cloudmart
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
