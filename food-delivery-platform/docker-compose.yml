version: '3.8'

services:
  # ----------------------------------
  # Databases & Caches
  # ----------------------------------
  postgres:
    build:
      context: ./database/postgres
      dockerfile: Dockerfile
    container_name: fd_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    build:
      context: ./database/redis
      dockerfile: Dockerfile
    container_name: fd_redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build:
      context: ./database/elasticsearch
      dockerfile: Dockerfile
    container_name: fd_elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elasticsecret}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - backend-network

  # ----------------------------------
  # Message Broker
  # ----------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: fd_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: fd_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend-network

  # ----------------------------------
  # NGINX Reverse Proxy
  # ----------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: fd_nginx_gateway
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - customer-portal
    networks:
      - backend-network
      - frontend-network

  # ----------------------------------
  # Core Services
  # ----------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: fd_api_gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - backend-network
    depends_on:
      - redis

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: fd_auth_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network

  order-service:
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    container_name: fd_order_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network


  payment-service:
    build:
      context: .
      dockerfile: backend/payment-service/Dockerfile
    container_name: fd_payment_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network

  restaurant-service:
    build:
      context: .
      dockerfile: backend/restaurant-service/Dockerfile
    container_name: fd_restaurant_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network

  menu-service:
    build:
      context: .
      dockerfile: backend/menu-service/Dockerfile
    container_name: fd_menu_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network

  admin-service:
    build:
      context: .
      dockerfile: backend/admin-service/Dockerfile
    container_name: fd_admin_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network

  search-service:
    build:
      context: .
      dockerfile: backend/search-service/Dockerfile
    container_name: fd_search_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network

  analytics-service:
    build:
      context: .
      dockerfile: backend/analytics-service/Dockerfile
    container_name: fd_analytics_service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - backend-network

  customer-portal:
    build:
      context: ./frontend/customer-portal
      dockerfile: Dockerfile
    container_name: fd_customer_portal
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:80/api
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elastic_data:
