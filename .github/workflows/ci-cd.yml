# ==============================================================
# CraveDrop - DevSecOps CI/CD Pipeline
# ==============================================================
name: CraveDrop DevSecOps Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/cravedrop-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/cravedrop-frontend

jobs:
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3ea9d8d73d29a597a7a379435b # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - working-directory: ${{ matrix.component }}
        run: npm ci
      - working-directory: ${{ matrix.component }}
        run: npm run lint

  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3ea9d8d73d29a597a7a379435b # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      - working-directory: ${{ matrix.component }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true

  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@c47758b7754f59c84e1b72186716a49590b5349e # v3.7.0
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@8e5442c4ef9f787516d2673d32831512f455325c # v5.6.1
        with:
          images: ghcr.io/${{ github.repository }}/cravedrop-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@4f58ea79222b3b0d2c77bd6b1e56b3e839e083c2 # v6.8.0
        with:
          context: ./${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  image-scan:
    name: "🔬 Scan Image"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: docker build -t cravedrop-${{ matrix.component }}:scan ./${{ matrix.component }}
      - uses: aquasecurity/trivy-action@51ebbe4198d021c1f541258d98d28a5061619a3b # master
        with:
          image-ref: "cravedrop-${{ matrix.component }}:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: bridgecrewio/checkov-action@01625470d068564177d40f2f35d2524316a3a412 # v12.2854.0
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true

  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    needs: [build, image-scan, iac-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Update manifest
        run: |
          TAG=${{ steps.sha.outputs.short }}
          sed -i "s|image: .*cravedrop-backend.*|image: ${BACKEND_IMAGE}:${TAG}|g" k8s/cravedrop.yaml
          sed -i "s|image: .*cravedrop-frontend.*|image: ${FRONTEND_IMAGE}:${TAG}|g" k8s/cravedrop.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/cravedrop.yaml
          git diff --cached --quiet || git commit -m "ci: update images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
