name: CloudMart CI CD

on:
  push:
    branches:
      - main
      - devops
  pull_request:
    branches:
      - main
      - devops

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  devsecops-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of SonarCloud analysis

      - name: Run Trivy filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' # Keep pipeline green for demonstration, flag warnings in report
          severity: 'CRITICAL,HIGH'

      - name: Run Semgrep SAST analysis
        uses: semgrep/semgrep-action@v1
        with:
          config: 'p/security-extended'
        continue-on-error: true # Safe fallback if repository lacks Semgrep Cloud token

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Safe fallback if not run in PR context

      - name: Run Checkov IaC security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          output_format: cli
          soft_fail: true # Soft fail to audit issues without blocking deployment

      - name: SonarCloud Code Quality Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Enterprise-DevSecOps-GitOps-Platform
            -Dsonar.organization=shashidhar-02
            -Dsonar.sources=apps/backend/src,apps/frontend/src
            -Dsonar.javascript.lcov.reportPaths=apps/backend/coverage/lcov.info
            -Dsonar.host.url=https://sonarcloud.io
        continue-on-error: true

