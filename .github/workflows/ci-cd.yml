name: CloudMart CI CD

on:
  push:
    branches:
      - main
      - devops
  pull_request:
    branches:
      - main
      - devops

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  devsecops-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan placeholder
        run: echo "Run Trivy in the devops branch pipeline"

      - name: Semgrep placeholder
        run: echo "Run Semgrep in the devops branch pipeline"

      - name: Gitleaks placeholder
        run: echo "Run Gitleaks in the devops branch pipeline"

      - name: Checkov placeholder
        run: echo "Run Checkov in the devops branch pipeline"
